<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperChat🥀</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="chat-body">

  <aside class="sidebar">
    <div class="sidebar-header">
      <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="12" fill="#6366f1"/>
        <path d="M8 12h24M8 20h16M8 28h20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="app-name">SuperChat🥀</span>
    </div>

    <div class="my-name-block">
      <div class="avatar" id="my-avatar"></div>
      <div>
        <div class="my-name" id="my-name-label">—</div>
        <div class="status-dot-row"><span class="dot dot-green"></span><span class="status-text">Online</span></div>
      </div>
    </div>

    <div class="new-chat-block">
      <input id="new-chat-input" type="text" placeholder="Username for new chat" autocomplete="off" />
      <button id="new-chat-btn" title="Create new chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-section-label">Chats</div>
    <ul id="chat-list" class="chat-list"></ul>

    <button id="logout-btn" class="logout-btn">Log out</button>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div id="chat-with-info" class="chat-with-info">
        <span id="chat-with-avatar" class="avatar avatar-sm"></span>
        <div>
          <div id="chat-with-name" class="chat-with-name">Select chat</div>
          <div id="chat-with-status" class="chat-with-status">← or create new</div>
        </div>
      </div>
    </header>

    <div id="messages" class="messages">
      <div class="empty-state">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="28" fill="#f1f0ff"/>
          <path d="M16 20h24M16 28h16M16 36h20" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Select chat on the left<br/>or start a conversation with user</p>
      </div>
    </div>

    <footer class="chat-footer">
      <input id="msg-input" type="text" placeholder="Message…" autocomplete="off" disabled />
      <button id="send-btn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </footer>
  </main>

  <script type="module" src="/static/js/chat.js"></script>
</body>
</html>
